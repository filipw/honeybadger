name: Release

# Publishes HoneyBadger + HoneyBadger.Onnx to NuGet on a version tag, e.g.
# `git tag v0.1.0 && git push origin v0.1.0`. Requires the NUGET_API_KEY repository secret.
# Note: HoneyBadger.Onnx depends on Kyoto, so publish the Kyoto package first.
on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Provision empty local feed
        run: mkdir -p ../.local-nuget

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Test
        run: dotnet test HoneyBadger.slnx -c Release

      - name: Pack
        run: |
          dotnet pack src/HoneyBadger/HoneyBadger.csproj -c Release -p:Version=${{ steps.ver.outputs.version }} -o artifacts
          dotnet pack src/HoneyBadger.Onnx/HoneyBadger.Onnx.csproj -c Release -p:Version=${{ steps.ver.outputs.version }} -o artifacts

      - name: Push to NuGet
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
